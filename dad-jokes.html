<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
            margin-bottom: 40px;
            font-style: italic;
        }

        .joke-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .joke-setup {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .joke-punchline {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-top: 15px;
            opacity: 0;
            animation: slideIn 0.6s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .punchline-hidden {
            color: #ccc;
            font-size: 1em;
            cursor: pointer;
        }

        .punchline-hidden:hover {
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .reaction-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .reaction-section.show {
            display: block;
        }

        .reaction-text {
            color: #555;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .reaction-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-yes, .btn-no {
            padding: 10px 25px;
            font-size: 0.95em;
            flex: 1;
            max-width: 150px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.3);
        }

        .btn-no {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-no:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        .feedback {
            font-size: 1em;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            animation: slideIn 0.5s ease;
        }

        .feedback.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.attempt {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .feedback.loading {
            background: #e7f3ff;
            color: #004085;
            border: 1px solid #bee5eb;
        }

        .emoji {
            font-size: 2em;
            margin: 10px 0;
        }

        .joke-counter {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .intensity {
            font-size: 0.9em;
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😄 Dad Joke Generator</h1>
        <p class="subtitle">Groan-inducing humor at your fingertips</p>

        <div class="joke-container">
            <div class="joke-setup" id="jokeSetup">
                Click the button to get your first joke!
            </div>
            <div class="joke-punchline" id="jokePunchline"></div>
        </div>

        <div class="intensity" id="intensityLevel"></div>

        <div class="button-group">
            <button class="btn-generate" onclick="generateJoke()">Generate Joke</button>
        </div>

        <div class="reaction-section" id="reactionSection">
            <div class="reaction-text">Did I make you laugh? 😏</div>
            <div class="reaction-buttons">
                <button class="btn-yes" onclick="reactYes()">Yes! 😂</button>
                <button class="btn-no" onclick="reactNo()">No 😑</button>
            </div>
        </div>

        <div id="feedback"></div>
        <div class="joke-counter" id="jokeCounter"></div>
    </div>

    <script>
        // Joke database with different intensity levels
        const jokeDatabase = {
            beginner: [
                {
                    setup: "Why don't scientists trust atoms?",
                    punchline: "Because they make up everything!"
                },
                {
                    setup: "What do you call a bear with no teeth?",
                    punchline: "A gummy bear!"
                },
                {
                    setup: "Why did the scarecrow win an award?",
                    punchline: "Because he was outstanding in his field!"
                },
                {
                    setup: "What do you call a fake noodle?",
                    punchline: "An impasta!"
                },
                {
                    setup: "Did you hear about the claustrophobic astronaut?",
                    punchline: "He just needed a little space!"
                }
            ],
            intermediate: [
                {
                    setup: "I'm reading a book on the history of glue – can't put it down.",
                    punchline: "It's just too sticky!"
                },
                {
                    setup: "Why did the coffee file a police report?",
                    punchline: "It got mugged!"
                },
                {
                    setup: "What's the best thing about Switzerland?",
                    punchline: "I don't know, but the flag is a big plus!"
                },
                {
                    setup: "Why don't eggs tell jokes?",
                    punchline: "They'd crack each other up!"
                },
                {
                    setup: "I used to hate facial hair, but then it grew on me.",
                    punchline: "Now we're best friends!"
                }
            ],
            advanced: [
                {
                    setup: "A man walks into a library and asks the librarian, 'Do you have any books about paranoia?'",
                    punchline: "The librarian whispers, 'They're right behind you...'"
                },
                {
                    setup: "Why did the programmer quit his job?",
                    punchline: "Because he didn't get arrays!"
                },
                {
                    setup: "What did the ocean say to the beach?",
                    punchline: "Nothing, it just waved!"
                },
                {
                    setup: "I told my wife she was drawing her eyebrows too high.",
                    punchline: "She looked surprised!"
                },
                {
                    setup: "Why don't skeletons fight each other?",
                    punchline: "They don't have the guts!"
                }
            ],
            extreme: [
                {
                    setup: "A grasshopper walks into a bar. The bartender says, 'Hey, we have a drink named after you!'",
                    punchline: "The grasshopper looks confused and says, 'What? You have a drink called Steve?'"
                },
                {
                    setup: "Why did the Invisible Man turn down the job offer?",
                    punchline: "He couldn't see himself doing it!"
                },
                {
                    setup: "What do you call a three-humped camel?",
                    punchline: "Pregnant! (Just kidding... it's just... regular.)"
                },
                {
                    setup: "Why did the math book look sad?",
                    punchline: "Because it had too many problems!"
                },
                {
                    setup: "I'd tell you a chemistry joke, but I know I wouldn't get a reaction.",
                    punchline: "Unless you're in the right compound!"
                }
            ],
            ultimate: [
                {
                    setup: "A man goes to the doctor and says, 'Doc, help me. I'm addicted to Twitter!'",
                    punchline: "The doctor replies, 'Sorry, I don't follow you.'"
                },
                {
                    setup: "Why don't you ever see hippopotamus hiding in trees?",
                    punchline: "Because they're so good at it!"
                },
                {
                    setup: "What's the difference between a poorly dressed man on a bicycle and a well-dressed man on a tricycle?",
                    punchline: "Attire! (A tire!)"
                },
                {
                    setup: "I used to play piano by ear, but now I use my hands.",
                    punchline: "It works much better!"
                },
                {
                    setup: "Why did the bicycle fall over?",
                    punchline: "Because it was two-tired!"
                }
            ]
        };

        let currentJoke = null;
        let jokeCount = 0;
        let intensity = 'beginner';
        let attemptCount = 0;

        function getRandomJoke(level) {
            const jokes = jokeDatabase[level];
            return jokes[Math.floor(Math.random() * jokes.length)];
        }

        function generateJoke() {
            attemptCount = 0;
            currentJoke = getRandomJoke(intensity);
            displayJoke();
            clearFeedback();
            updateCounter();
        }

        function displayJoke() {
            const setup = document.getElementById('jokeSetup');
            const punchline = document.getElementById('jokePunchline');
            
            setup.textContent = currentJoke.setup;
            punchline.textContent = currentJoke.punchline;
            
            // Reset animation
            punchline.style.animation = 'none';
            setTimeout(() => {
                punchline.style.animation = '';
            }, 10);

            document.getElementById('reactionSection').classList.add('show');
            updateIntensityLevel();
        }

        function updateIntensityLevel() {
            const levels = {
                beginner: '😊 Classic Level',
                intermediate: '😏 Getting Cheesier',
                advanced: '🤨 Advanced Groaning',
                extreme: '😵 Extreme Cringe',
                ultimate: '🚀 Peak Dad Energy'
            };
            document.getElementById('intensityLevel').textContent = `Current Level: ${levels[intensity]}`;
        }

        function updateCounter() {
            jokeCount++;
            document.getElementById('jokeCounter').textContent = `Jokes told: ${jokeCount} | Attempt: ${attemptCount + 1}`;
        }

        function reactYes() {
            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback success';
            feedback.innerHTML = `
                <div class="emoji">🎉</div>
                <strong>Mission accomplished!</strong><br>
                My dad joke powers are strong with this one!
            `;
            
            // Increase intensity for next joke
            const levels = ['beginner', 'intermediate', 'advanced', 'extreme', 'ultimate'];
            const currentIndex = levels.indexOf(intensity);
            if (currentIndex < levels.length - 1) {
                intensity = levels[currentIndex + 1];
            }
            
            setTimeout(() => {
                document.getElementById('reactionSection').classList.remove('show');
            }, 2000);
        }

        function reactNo() {
            attemptCount++;
            const feedback = document.getElementById('feedback');
            
            if (attemptCount < 3) {
                feedback.className = 'feedback attempt';
                const messages = [
                    `<div class="emoji">🤔</div>No laugh? Challenge accepted! Let me try harder...`,
                    `<div class="emoji">😤</div>Not funny enough? Buckle up, here comes the big guns...`,
                    `<div class="emoji">🔥</div>Alright, deploying maximum cringe mode...`
                ];
                feedback.innerHTML = messages[attemptCount - 1];
                
                // Increase intensity
                const levels = ['beginner', 'intermediate', 'advanced', 'extreme', 'ultimate'];
                const currentIndex = levels.indexOf(intensity);
                if (currentIndex < levels.length - 1) {
                    intensity = levels[currentIndex + 1];
                }
                
                // Generate a funnier (cringe-ier) joke
                setTimeout(() => {
                    currentJoke = getRandomJoke(intensity);
                    displayJoke();
                    updateCounter();
                }, 1500);
            } else {
                feedback.className = 'feedback attempt';
                feedback.innerHTML = `
                    <div class="emoji">😭</div>
                    <strong>I've unleashed the ultimate dad humor!</strong><br>
                    If this didn't make you laugh, nothing will. Time to reset...
                `;
                intensity = 'beginner';
                attemptCount = 0;
            }
        }

        function clearFeedback() {
            document.getElementById('feedback').innerHTML = '';
        }

        // Initialize
        updateIntensityLevel();
    </script>
</body>
</html>
